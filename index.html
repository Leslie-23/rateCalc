<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>GHS to NGN Exchange Calculator</title>
    <link rel="stylesheet" href="index.css" />
    <link rel="manifest" href="manifest.json" />
    <meta name="theme-color" content="#12312b" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="GHS NGN" />
    <link rel="apple-touch-icon" href="icons/icon.svg" />
    <script src="config.js"></script>
</head>
<body>
    <main class="app-shell">
        <section class="hero">
            <div>
                <p class="eyebrow">Live exchange calculator</p>
                <h1>GHS to NGN</h1>
            </div>
            <div class="rate-strip" aria-live="polite">
                <div>
                    <span>Send rate</span>
                    <strong id="sendRateView">--</strong>
                </div>
                <div>
                    <span>Receive rate</span>
                    <strong id="receiveRateView">--</strong>
                </div>
            </div>
        </section>

        <section class="calculator" aria-labelledby="calculatorTitle">
            <div class="section-heading">
                <p class="eyebrow">Calculator</p>
                <h2 id="calculatorTitle">Choose what you want to do</h2>
            </div>

            <div class="mode-grid" role="group" aria-label="Exchange direction">
                <button class="mode-card active" type="button" data-mode="GHS_SEND">
                    <span>Send GHS</span>
                    <strong>Get NGN</strong>
                </button>
                <button class="mode-card" type="button" data-mode="NGN_SEND">
                    <span>Send NGN</span>
                    <strong>Get GHS</strong>
                </button>
                <button class="mode-card" type="button" data-mode="GHS_RECV">
                    <span>Want GHS</span>
                    <strong>Pay NGN</strong>
                </button>
                <button class="mode-card" type="button" data-mode="NGN_RECV">
                    <span>Want NGN</span>
                    <strong>Pay GHS</strong>
                </button>
            </div>

            <div class="amount-panel">
                <label class="field">
                    <span id="amountLabel">Amount in GHS</span>
                    <div class="input-wrap">
                        <span class="currency-code" id="amountCurrency">GHS</span>
                        <input id="amountInput" type="number" min="0" step="0.01" inputmode="decimal" placeholder="0.00" />
                    </div>
                </label>

                <div class="result-panel" aria-live="polite">
                    <span id="resultLabel">Customer receives</span>
                    <strong id="resultAmount">Enter amount</strong>
                    <small id="resultNote">Rates update automatically from the desk.</small>
                </div>
            </div>
        </section>

        <section class="quick-amounts" aria-label="Quick amounts">
            <button type="button" data-quick="100">100</button>
            <button type="button" data-quick="500">500</button>
            <button type="button" data-quick="1000">1,000</button>
            <button type="button" data-quick="5000">5,000</button>
        </section>

        <p class="status-line" id="syncStatus" aria-live="polite">Loading rates...</p>
    </main>

    <script src="index.js"></script>
    <script>
        if ("serviceWorker" in navigator) {
            window.addEventListener("load", () => {
                navigator.serviceWorker.register("./sw.js").catch(() => {});
            });
        }
    </script>
</body>
</html>
